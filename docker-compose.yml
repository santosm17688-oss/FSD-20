version: '3.8'

services:
  testing-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testing-backend-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    volumes:
      - .:/app
      - /app/node_modules
    command: npm start
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Optional: Add a reverse proxy (Nginx)
  nginx:
    image: nginx:alpine
    container_name: testing-backend-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - testing-backend
    restart: unless-stopped

volumes:
  node_modules:
